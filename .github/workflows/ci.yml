name: CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -r api/app

  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datagate
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r api/requirements.txt pytest pytest-asyncio
      - run: bash db/entrypoint.sh
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: datagate
          INIT_DIR: db/init
      - run: |
          psql -h localhost -U postgres -d datagate -c \
          "GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_user;"
        env:
          PGPASSWORD: postgres
      - run: pytest api/tests/ -v

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t data-gate-api:ci ./api
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: data-gate-api:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
